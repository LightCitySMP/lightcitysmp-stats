<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightCitySMP — Season 6</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #0a0b0f;
    --surface: #13141a;
    --surface-hover: #1a1b23;
    --border: #252631;
    --border-light: #2e2f3d;
    --text: #e8e8ec;
    --text-dim: #8a8b96;
    --text-faint: #4a4b56;
    --green: #4ade80;
    --green-dim: #22c55e;
    --blue: #60a5fa;
    --blue-dim: #3b82f6;
    --gray: #71717a;
    --red: #f87171;
    --amber: #fbbf24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
}

/* Header */
header {
    margin-bottom: 2.5rem;
}

.season-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
}

.season-tag::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.15);
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.25rem;
}

.subtitle {
    font-size: 0.9375rem;
    color: var(--text-dim);
}

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
}

.stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    transition: border-color 0.2s, transform 0.2s;
}

.stat-card:hover {
    border-color: var(--border-light);
    transform: translateY(-1px);
}

.stat-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
}

.stat-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.stat-delta {
    font-size: 0.6875rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    font-variant-numeric: tabular-nums;
}

.stat-delta.up {
    color: var(--green);
    background: rgba(74, 222, 128, 0.08);
}

.stat-delta.down {
    color: var(--red);
    background: rgba(248, 113, 113, 0.08);
}

.stat-delta.flat {
    color: var(--text-faint);
    background: rgba(74, 75, 86, 0.15);
}

.stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
}

.stat-value.green { color: var(--green); }
.stat-value.blue { color: var(--blue); }
.stat-value.amber { color: var(--amber); }

.sparkline-wrap {
    height: 32px;
    margin-top: 0.25rem;
}

/* Main */
.main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1rem;
    align-items: start;
}

.panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
}

.panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.25rem 0;
    margin-bottom: 1rem;
}

.panel-title {
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.panel-count {
    font-size: 0.75rem;
    color: var(--text-faint);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

/* Chart */
.chart-toolbar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1.25rem 1.25rem 0;
    margin-bottom: 1rem;
    flex-wrap: wrap;
}

.chart-type-group, .dataset-group {
    display: flex;
    gap: 0;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
}

.toggle-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 0.4rem 0.875rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8125rem;
    font-weight: 600;
    transition: all 0.15s;
    font-family: inherit;
}

.toggle-btn:hover {
    color: var(--text);
}

.toggle-btn.active {
    background: var(--surface-hover);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.dataset-group .toggle-btn {
    font-size: 0.75rem;
    padding: 0.4rem 0.75rem;
}

.dataset-group .toggle-btn[data-ds="0"].active { color: var(--green); }
.dataset-group .toggle-btn[data-ds="1"].active { color: var(--blue); }
.dataset-group .toggle-btn[data-ds="2"].active { color: var(--gray); }

.chart-wrap {
    padding: 0 1.25rem 1.25rem;
    height: 460px;
}

/* Config */
.config-body {
    padding: 0 1.25rem;
}

.config-header {
    display: grid;
    grid-template-columns: 1fr 64px 64px 64px 32px;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0 0.25rem;
}

.config-header span {
    font-size: 0.625rem;
    font-weight: 700;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.config-header span:nth-child(2),
.config-header span:nth-child(3),
.config-header span:nth-child(4) {
    text-align: center;
}

.config-scroll {
    max-height: 360px;
    overflow-y: auto;
    padding-right: 0.25rem;
}

.config-scroll::-webkit-scrollbar { width: 4px; }
.config-scroll::-webkit-scrollbar-track { background: transparent; }
.config-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.config-row {
    display: grid;
    grid-template-columns: 1fr 64px 64px 64px 32px;
    gap: 0.5rem;
    margin-bottom: 0.35rem;
    align-items: center;
}

.config-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.625rem;
    border-radius: 8px;
    font-size: 0.8125rem;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
}

.config-row input:hover {
    border-color: var(--border-light);
}

.config-row input:focus {
    outline: none;
    border-color: var(--green-dim);
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.08);
}

.config-row input[type="text"] {
    font-weight: 600;
}

.config-row input[type="number"] {
    text-align: center;
    font-variant-numeric: tabular-nums;
}

.btn-delete {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}

.btn-delete:hover {
    background: rgba(248, 113, 113, 0.08);
    border-color: rgba(248, 113, 113, 0.2);
    color: var(--red);
}

.panel-footer {
    padding: 1rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.btn-primary {
    width: 100%;
    background: var(--green-dim);
    border: 1px solid var(--green-dim);
    color: #052e16;
    padding: 0.625rem;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 700;
    transition: all 0.15s;
    font-family: inherit;
}

.btn-primary:hover {
    background: var(--green);
    transform: translateY(-1px);
}

.btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
}

.btn-row {
    display: flex;
    gap: 0.5rem;
}

.btn-secondary {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    transition: all 0.15s;
    font-family: inherit;
}

.btn-secondary:hover {
    border-color: var(--border-light);
    color: var(--text);
}

/* Responsive */
@media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .main-grid { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 1.5rem 1rem; }
    h1 { font-size: 1.5rem; }
    .config-header, .config-row {
        grid-template-columns: 1fr 52px 52px 52px 28px;
        gap: 0.35rem;
    }
}

@media (max-width: 420px) {
    .stats-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
    <header>
        <div class="season-tag">Season 6</div>
        <h1>LightCitySMP Statistics</h1>
        <div class="subtitle">Player activity dashboard</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-top">
                <span class="stat-label">Highest Peak</span>
                <span class="stat-delta flat" id="deltaPeak">—</span>
            </div>
            <div class="stat-value green" id="totalPeak">0</div>
            <div class="sparkline-wrap"><canvas id="sparkPeak"></canvas></div>
        </div>
        <div class="stat-card">
            <div class="stat-top">
                <span class="stat-label">Overall Average</span>
                <span class="stat-delta flat" id="deltaAvg">—</span>
            </div>
            <div class="stat-value blue" id="totalAvg">0</div>
            <div class="sparkline-wrap"><canvas id="sparkAvg"></canvas></div>
        </div>
        <div class="stat-card">
            <div class="stat-top">
                <span class="stat-label">Days Tracked</span>
                <span class="stat-delta flat">/50</span>
            </div>
            <div class="stat-value" id="totalDays">0</div>
            <div class="sparkline-wrap"><canvas id="sparkDays"></canvas></div>
        </div>
        <div class="stat-card">
            <div class="stat-top">
                <span class="stat-label">Player-Hours</span>
                <span class="stat-delta flat">Est.</span>
            </div>
            <div class="stat-value amber" id="totalPlayers">0</div>
            <div class="sparkline-wrap"><canvas id="sparkHours"></canvas></div>
        </div>
        <div class="stat-card">
            <div class="stat-top">
                <span class="stat-label">Latest Trend</span>
                <span class="stat-delta flat" id="trendBadge">—</span>
            </div>
            <div class="stat-value" id="trendDay">—</div>
            <div class="sparkline-wrap"><canvas id="sparkTrend"></canvas></div>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Configuration</span>
                <span class="panel-count" id="dayCounter">1 / 50</span>
            </div>
            <div class="config-body">
                <div class="config-header">
                    <span>Day</span>
                    <span>Peak</span>
                    <span>Avg</span>
                    <span>Min</span>
                    <span></span>
                </div>
                <div class="config-scroll">
                    <div id="configRows"></div>
                </div>
            </div>
            <div class="panel-footer">
                <button class="btn-primary" id="addBtn" onclick="addDay()">+ Add Day</button>
                <div class="btn-row">
                    <button class="btn-secondary" onclick="exportData()">Export JSON</button>
                    <button class="btn-secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
                    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="chart-toolbar">
                <div class="chart-type-group">
                    <button class="toggle-btn active" onclick="setChartType('bar')">Bar</button>
                    <button class="toggle-btn" onclick="setChartType('line')">Line</button>
                    <button class="toggle-btn" onclick="setChartType('mixed')">Mixed</button>
                </div>
                <div class="dataset-group">
                    <button class="toggle-btn active" data-ds="0" onclick="toggleDataset(0)">Peak</button>
                    <button class="toggle-btn active" data-ds="1" onclick="toggleDataset(1)">Avg</button>
                    <button class="toggle-btn active" data-ds="2" onclick="toggleDataset(2)">Min</button>
                </div>
            </div>
            <div class="chart-wrap">
                <canvas id="playersChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let smpStats = [
    { day: "Day 1", peak: 25, avg: 14, min: 2 }
];

const MAX_DAYS = 50;
let chart;
let currentChartType = 'bar';
let visibleDatasets = [true, true, true];

function initChart() {
    const ctx = document.getElementById('playersChart').getContext('2d');

    Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
    Chart.defaults.color = '#4a4b56';

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Peak',
                    data: [],
                    backgroundColor: 'rgba(74, 222, 128, 0.75)',
                    borderColor: '#4ade80',
                    borderWidth: 0,
                    borderRadius: 5,
                    borderSkipped: false,
                    order: 1,
                    hoverBackgroundColor: '#4ade80',
                },
                {
                    label: 'Average',
                    data: [],
                    backgroundColor: 'rgba(96, 165, 250, 0.75)',
                    borderColor: '#60a5fa',
                    borderWidth: 0,
                    borderRadius: 5,
                    borderSkipped: false,
                    order: 2,
                    hoverBackgroundColor: '#60a5fa',
                },
                {
                    label: 'Minimum',
                    data: [],
                    backgroundColor: 'rgba(113, 113, 122, 0.55)',
                    borderColor: '#71717a',
                    borderWidth: 0,
                    borderRadius: 5,
                    borderSkipped: false,
                    order: 3,
                    hoverBackgroundColor: '#a1a1aa',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#13141a',
                    titleColor: '#e8e8ec',
                    bodyColor: '#8a8b96',
                    borderColor: '#252631',
                    borderWidth: 1,
                    padding: 12,
                    cornerRadius: 10,
                    titleFont: { size: 12, weight: '700' },
                    bodyFont: { size: 12 },
                    displayColors: true,
                    boxPadding: 5,
                    usePointStyle: true,
                    callbacks: {
                        afterBody: function(context) {
                            const idx = context[0].dataIndex;
                            const stat = smpStats[idx];
                            return `Range: ${stat.peak - stat.min} players`;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 55,
                    grid: {
                        color: 'rgba(37, 38, 49, 0.6)',
                        drawBorder: false,
                    },
                    ticks: {
                        color: '#4a4b56',
                        padding: 10,
                        font: { size: 11 },
                        stepSize: 5
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        color: '#4a4b56',
                        font: { size: 11 },
                        maxRotation: 45,
                        minRotation: 0
                    }
                }
            },
            animation: {
                duration: 400,
                easing: 'easeOutCubic'
            }
        }
    });
}

function renderConfig() {
    const container = document.getElementById('configRows');
    container.innerHTML = '';

    smpStats.forEach((stat, index) => {
        const row = document.createElement('div');
        row.className = 'config-row';
        row.innerHTML = `
            <input type="text" value="${stat.day}" onchange="updateStat(${index}, 'day', this.value)" placeholder="Day">
            <input type="number" value="${stat.peak}" onchange="updateStat(${index}, 'peak', this.value)" placeholder="Peak" min="0" max="50">
            <input type="number" value="${stat.avg}" onchange="updateStat(${index}, 'avg', this.value)" placeholder="Avg" min="0" max="50">
            <input type="number" value="${stat.min}" onchange="updateStat(${index}, 'min', this.value)" placeholder="Min" min="0" max="50">
            <button class="btn-delete" onclick="removeDay(${index})" title="Remove">×</button>
        `;
        container.appendChild(row);
    });

    const addBtn = document.getElementById('addBtn');
    document.getElementById('dayCounter').textContent = `${smpStats.length} / ${MAX_DAYS}`;
    
    if (smpStats.length >= MAX_DAYS) {
        addBtn.disabled = true;
        addBtn.textContent = 'Limit reached';
    } else {
        addBtn.disabled = false;
        addBtn.textContent = `+ Add Day (${smpStats.length}/${MAX_DAYS})`;
    }
}

function updateStat(index, field, value) {
    if (field === 'day') {
        smpStats[index][field] = value;
    } else {
        let num = parseInt(value) || 0;
        if (num > 50) num = 50;
        if (num < 0) num = 0;
        smpStats[index][field] = num;
    }
    updateChart();
    updateSummary();
    renderConfig();
}

function addDay() {
    if (smpStats.length >= MAX_DAYS) return;
    const nextDay = smpStats.length + 1;
    smpStats.push({ day: `Day ${nextDay}`, peak: 0, avg: 0, min: 0 });
    renderConfig();
    updateChart();
    updateSummary();

    setTimeout(() => {
        const scrollBox = document.querySelector('.config-scroll');
        scrollBox.scrollTop = scrollBox.scrollHeight;
    }, 50);
}

function removeDay(index) {
    if (smpStats.length <= 1) return;
    smpStats.splice(index, 1);
    smpStats.forEach((s, i) => { s.day = `Day ${i + 1}`; });
    renderConfig();
    updateChart();
    updateSummary();
}

function updateChart() {
    chart.data.labels = smpStats.map(s => s.day);
    chart.data.datasets[0].data = smpStats.map(s => s.peak);
    chart.data.datasets[1].data = smpStats.map(s => s.avg);
    chart.data.datasets[2].data = smpStats.map(s => s.min);

    chart.data.datasets.forEach((ds, i) => {
        ds.hidden = !visibleDatasets[i];
    });

    chart.update('active');
    drawSparklines();
}

function updateSummary() {
    const maxPeak = Math.max(...smpStats.map(s => s.peak), 0);
    const avgAll = smpStats.length > 0 ? Math.round(smpStats.reduce((a, b) => a + b.avg, 0) / smpStats.length) : 0;
    const totalHours = smpStats.reduce((a, b) => a + b.avg, 0) * 12;

    document.getElementById('totalPeak').textContent = maxPeak;
    document.getElementById('totalAvg').textContent = avgAll;
    document.getElementById('totalDays').textContent = smpStats.length;
    document.getElementById('totalPlayers').textContent = totalHours.toLocaleString();

    // Delta badges
    const prevMax = smpStats.length > 1 
        ? Math.max(...smpStats.slice(0, -1).map(s => s.peak), 0) 
        : maxPeak;
    const deltaPeak = maxPeak - prevMax;
    const peakBadge = document.getElementById('deltaPeak');
    if (deltaPeak > 0) { peakBadge.className = 'stat-delta up'; peakBadge.textContent = `+${deltaPeak}`; }
    else if (deltaPeak < 0) { peakBadge.className = 'stat-delta down'; peakBadge.textContent = `${deltaPeak}`; }
    else { peakBadge.className = 'stat-delta flat'; peakBadge.textContent = '—'; }

    const prevAvg = smpStats.length > 1
        ? Math.round(smpStats.slice(0, -1).reduce((a, b) => a + b.avg, 0) / (smpStats.length - 1))
        : avgAll;
    const deltaAvg = avgAll - prevAvg;
    const avgBadge = document.getElementById('deltaAvg');
    if (deltaAvg > 0) { avgBadge.className = 'stat-delta up'; avgBadge.textContent = `+${deltaAvg}`; }
    else if (deltaAvg < 0) { avgBadge.className = 'stat-delta down'; avgBadge.textContent = `${deltaAvg}`; }
    else { avgBadge.className = 'stat-delta flat'; avgBadge.textContent = '—'; }

    // Trend
    const trendEl = document.getElementById('trendDay');
    const trendBadge = document.getElementById('trendBadge');
    const trendText = document.getElementById('trendText');

    if (smpStats.length >= 2) {
        const last = smpStats[smpStats.length - 1];
        const prev = smpStats[smpStats.length - 2];
        const diff = last.peak - prev.peak;

        if (diff > 0) {
            trendEl.textContent = `+${diff}`;
            trendEl.className = 'stat-value green';
            trendBadge.className = 'stat-delta up';
            trendBadge.textContent = 'Rising';
        } else if (diff < 0) {
            trendEl.textContent = `${diff}`;
            trendEl.className = 'stat-value';
            trendBadge.className = 'stat-delta down';
            trendBadge.textContent = 'Falling';
        } else {
            trendEl.textContent = '0';
            trendEl.className = 'stat-value';
            trendBadge.className = 'stat-delta flat';
            trendBadge.textContent = 'Flat';
        }
    } else {
        trendEl.textContent = '—';
        trendEl.className = 'stat-value';
        trendBadge.className = 'stat-delta flat';
        trendBadge.textContent = 'Waiting';
    }
}

function setChartType(type) {
    currentChartType = type;
    document.querySelectorAll('.chart-type-group .toggle-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (type === 'bar' && i === 0) || (type === 'line' && i === 1) || (type === 'mixed' && i === 2));
    });

    if (type === 'mixed') {
        chart.config.type = 'bar';
        chart.data.datasets[0].type = 'line';
        chart.data.datasets[0].fill = false;
        chart.data.datasets[0].tension = 0.35;
        chart.data.datasets[0].pointRadius = 4;
        chart.data.datasets[0].pointBackgroundColor = '#4ade80';
        chart.data.datasets[0].pointBorderColor = '#0a0b0f';
        chart.data.datasets[0].pointBorderWidth = 2;
        chart.data.datasets[0].borderWidth = 2;
        chart.data.datasets[1].type = 'bar';
        chart.data.datasets[2].type = 'bar';
    } else if (type === 'line') {
        chart.config.type = 'line';
        chart.data.datasets.forEach(ds => {
            ds.type = 'line';
            ds.fill = false;
            ds.tension = 0.35;
            ds.pointRadius = 4;
            ds.pointBackgroundColor = ds.borderColor;
            ds.pointBorderColor = '#0a0b0f';
            ds.pointBorderWidth = 2;
            ds.borderWidth = 2;
        });
    } else {
        chart.config.type = 'bar';
        chart.data.datasets.forEach(ds => {
            ds.type = 'bar';
            delete ds.fill;
            delete ds.tension;
            delete ds.pointRadius;
            delete ds.pointBackgroundColor;
            delete ds.pointBorderColor;
            delete ds.pointBorderWidth;
            ds.borderWidth = 0;
        });
    }
    chart.update();
}

function toggleDataset(index) {
    visibleDatasets[index] = !visibleDatasets[index];
    const btn = document.querySelector(`.dataset-group .toggle-btn[data-ds="${index}"]`);
    btn.classList.toggle('active', visibleDatasets[index]);
    updateChart();
}

function drawSparklines() {
    drawSparkline('sparkPeak', smpStats.map(s => s.peak), '#4ade80');
    drawSparkline('sparkAvg', smpStats.map(s => s.avg), '#60a5fa');
    drawSparkline('sparkDays', smpStats.map((_, i) => i + 1), '#e8e8ec');
    drawSparkline('sparkHours', smpStats.map(s => s.avg * 12), '#fbbf24');
    if (smpStats.length >= 2) {
        const diffs = smpStats.slice(1).map((s, i) => s.peak - smpStats[i].peak);
        drawSparkline('sparkTrend', diffs, '#f87171');
    } else {
        const c = document.getElementById('sparkTrend');
        if (c) {
            const ctx = c.getContext('2d');
            ctx.clearRect(0, 0, c.width, c.height);
        }
    }
}

function drawSparkline(canvasId, data, color) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    if (!w || !h) return;
    
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    if (data.length < 2) return;

    const max = Math.max(...data, 1);
    const min = Math.min(...data);
    const range = max - min || 1;

    // Smooth line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const getX = i => (i / (data.length - 1)) * w;
    const getY = v => h - ((v - min) / range) * (h - 6) - 3;

    data.forEach((val, i) => {
        const x = getX(i);
        const y = getY(val);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Subtle fill
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = color + '12';
    ctx.fill();

    // End dot
    const lastY = getY(data[data.length - 1]);
    ctx.beginPath();
    ctx.arc(w - 2, lastY, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

function exportData() {
    const blob = new Blob([JSON.stringify(smpStats, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lightcity-smp-season6.json';
    a.click();
    URL.revokeObjectURL(url);
}

function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data) && data.length <= MAX_DAYS && data.every(d => d.day && 'peak' in d && 'avg' in d && 'min' in d)) {
                smpStats = data;
                renderConfig();
                updateChart();
                updateSummary();
            } else {
                alert('Invalid file format or exceeds 50 days limit');
            }
        } catch (err) {
            alert('Failed to parse JSON file');
        }
    };
    reader.readAsText(file);
    input.value = '';
}

initChart();
renderConfig();
updateChart();
updateSummary();
drawSparklines();

window.addEventListener('resize', drawSparklines);
</script>
