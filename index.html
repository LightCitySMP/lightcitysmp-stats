<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season 6 Stats — LightCitySMP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg: #05080f;
    --bg-elevated: #0c1220;
    --bg-card: #111827;
    --border: #1e293b;
    --border-hover: #334155;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-green: #22c55e;
    --accent-green-glow: rgba(34, 197, 94, 0.15);
    --accent-blue: #3b82f6;
    --accent-purple: #a855f7;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --gradient-hero: linear-gradient(135deg, #22c55e 0%, #3b82f6 50%, #a855f7 100%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
}

/* Animated background mesh */
.bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(34,197,94,0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(59,130,246,0.06), transparent),
        radial-gradient(ellipse 50% 50% at 50% 100%, rgba(168,85,247,0.04), transparent);
}

.container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
}

/* Header */
header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
}

.season-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent-green-glow);
    border: 1px solid rgba(34,197,94,0.3);
    color: var(--accent-green);
    padding: 0.35rem 1rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    animation: pulse-glow 3s ease-in-out infinite;
}

.season-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-green);
}

@keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.1); }
    50% { box-shadow: 0 0 30px rgba(34,197,94,0.2); }
}

h1 {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: var(--gradient-hero);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
}

.subtitle {
    color: var(--text-muted);
    font-size: 1.05rem;
    font-weight: 400;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1.25rem;
    margin-bottom: 2rem;
}

.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: default;
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient-hero);
    opacity: 0;
    transition: opacity 0.3s;
}

.stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.stat-card:hover::before { opacity: 1; }

.stat-card:nth-child(1) { --card-accent: var(--accent-green); }
.stat-card:nth-child(2) { --card-accent: var(--accent-blue); }
.stat-card:nth-child(3) { --card-accent: var(--accent-purple); }
.stat-card:nth-child(4) { --card-accent: var(--accent-amber); }
.stat-card:nth-child(5) { --card-accent: var(--accent-red); }

.stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--card-accent);
    opacity: 0.1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    font-size: 1.25rem;
}

.stat-value {
    font-size: 2.25rem;
    font-weight: 800;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
}

.stat-value.accent { color: var(--card-accent); }

.stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.stat-meta {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.35rem;
}

.stat-meta span { color: var(--card-accent); font-weight: 600; }

.mini-sparkline {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    opacity: 0.15;
    pointer-events: none;
}

/* Main Grid */
.main-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 1.5rem;
    align-items: start;
}

.panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    position: relative;
}

.panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
}

.panel h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.panel h2::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--gradient-hero);
    border-radius: 2px;
}

/* Chart */
.chart-wrapper {
    position: relative;
    height: 500px;
}

.chart-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
}

.toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.45rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
}

.toggle-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-secondary);
}

.toggle-btn.active {
    background: var(--bg-elevated);
    border-color: currentColor;
    color: var(--text-primary);
}

/* Config */
.config-scroll {
    max-height: 440px;
    overflow-y: auto;
    padding-right: 0.5rem;
}

.config-scroll::-webkit-scrollbar { width: 5px; }
.config-scroll::-webkit-scrollbar-track { background: transparent; }
.config-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.config-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

.config-header {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 36px;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0 0.25rem;
}

.config-header span {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
}

.config-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 36px;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
    align-items: center;
    padding: 0.35rem;
    border-radius: 10px;
    transition: background 0.15s;
}

.config-row:hover { background: rgba(255,255,255,0.02); }

.config-row input {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 0.55rem 0.65rem;
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    width: 100%;
    transition: all 0.15s;
}

.config-row input:focus {
    outline: none;
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px var(--accent-green-glow);
}

.config-row input[type="text"] { font-family: 'Inter', sans-serif; font-weight: 600; }
.config-row input[type="number"] { text-align: center; }

.config-row .day-num {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 600;
    padding-left: 0.5rem;
}

.btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.6rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
}

.btn:hover {
    background: var(--border);
    color: var(--text-primary);
}

.btn-add {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #000;
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem;
    font-weight: 700;
    font-size: 0.9rem;
}

.btn-add:hover {
    background: #16a34a;
    border-color: #16a34a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
}

.btn-add:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.btn-delete {
    color: var(--accent-red);
    padding: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 1.1rem;
    line-height: 1;
}

.btn-delete:hover {
    background: rgba(239,68,68,0.1);
    border-color: var(--accent-red);
}

.action-row {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
}

.action-row .btn {
    flex: 1;
    font-size: 0.75rem;
    padding: 0.5rem;
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
}

.empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 1rem;
    opacity: 0.3;
}

/* Trend */
.trend-up { color: var(--accent-green); }
.trend-down { color: var(--accent-red); }
.trend-flat { color: var(--text-muted); }

.trend-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
}

.trend-pill.up { background: rgba(34,197,94,0.1); color: var(--accent-green); }
.trend-pill.down { background: rgba(239,68,68,0.1); color: var(--accent-red); }
.trend-pill.flat { background: rgba(100,116,139,0.1); color: var(--text-muted); }

/* Tooltip custom */
.custom-tooltip {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    color: var(--text-primary);
}

/* Responsive */
@media (max-width: 1200px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .main-grid { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
    h1 { font-size: 2rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 1rem; }
    .config-header, .config-row {
        grid-template-columns: 1fr 60px 60px 60px 36px;
    }
}

@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .config-header, .config-row {
        grid-template-columns: 1fr 50px 50px 50px 32px;
        gap: 0.35rem;
    }
    .config-header span { font-size: 0.6rem; }
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="container">
    <header>
        <div class="season-badge">● Live Season</div>
        <h1>LightCitySMP Statistics</h1>
        <div class="subtitle">Season 6 Player Activity Dashboard</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-value accent" id="totalPeak">0</div>
            <div class="stat-label">Highest Peak</div>
            <div class="stat-meta">All-time record</div>
            <canvas class="mini-sparkline" id="sparkPeak"></canvas>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-value accent" id="totalAvg">0</div>
            <div class="stat-label">Overall Average</div>
            <div class="stat-meta">Across all days</div>
            <canvas class="mini-sparkline" id="sparkAvg"></canvas>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-value accent" id="totalDays">0</div>
            <div class="stat-label">Days Tracked</div>
            <div class="stat-meta">Limit: <span>50</span></div>
            <canvas class="mini-sparkline" id="sparkDays"></canvas>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value accent" id="totalPlayers">0</div>
            <div class="stat-label">Player-Hours</div>
            <div class="stat-meta">Est. <span>12h</span> uptime/day</div>
            <canvas class="mini-sparkline" id="sparkHours"></canvas>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-value accent" id="trendDay">—</div>
            <div class="stat-label">Latest Trend</div>
            <div class="stat-meta" id="trendText">Waiting for data...</div>
            <canvas class="mini-sparkline" id="sparkTrend"></canvas>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header">
                <h2>Data Config</h2>
                <span style="font-size:0.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;" id="dayCounter">1/50</span>
            </div>
            <div class="config-header">
                <span>Day</span>
                <span style="text-align:center;">Peak</span>
                <span style="text-align:center;">Avg</span>
                <span style="text-align:center;">Min</span>
                <span></span>
            </div>
            <div class="config-scroll">
                <div id="configRows"></div>
            </div>
            <button class="btn btn-add" id="addBtn" onclick="addDay()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg>
                Add Day
            </button>
            <div class="action-row">
                <button class="btn" onclick="exportData()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Export
                </button>
                <button class="btn" onclick="document.getElementById('importFile').click()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    Import
                </button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
            </div>
        </div>

        <div class="panel">
            <div class="chart-toggle">
                <button class="toggle-btn active" onclick="setChartType('bar')">Bar</button>
                <button class="toggle-btn" onclick="setChartType('line')">Line</button>
                <button class="toggle-btn" onclick="setChartType('mixed')">Mixed</button>
                <div style="width:1px;background:var(--border);margin:0 0.25rem;"></div>
                <button class="toggle-btn active" onclick="toggleDataset(0)" style="color:#22c55e;">Peak</button>
                <button class="toggle-btn active" onclick="toggleDataset(1)" style="color:#3b82f6;">Avg</button>
                <button class="toggle-btn active" onclick="toggleDataset(2)" style="color:#94a3b8;">Min</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="playersChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let smpStats = [
    { day: "Day 1", peak: 25, avg: 14, min: 2 }
];

const MAX_DAYS = 50;
let chart;
let currentChartType = 'bar';
let visibleDatasets = [true, true, true];

function initChart() {
    const ctx = document.getElementById('playersChart').getContext('2d');

    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
    Chart.defaults.color = '#64748b';

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Peak',
                    data: [],
                    backgroundColor: 'rgba(34, 197, 94, 0.8)',
                    borderColor: '#22c55e',
                    borderWidth: 0,
                    borderRadius: 6,
                    borderSkipped: false,
                    order: 1,
                    hoverBackgroundColor: '#22c55e',
                },
                {
                    label: 'Average',
                    data: [],
                    backgroundColor: 'rgba(59, 130, 246, 0.8)',
                    borderColor: '#3b82f6',
                    borderWidth: 0,
                    borderRadius: 6,
                    borderSkipped: false,
                    order: 2,
                    hoverBackgroundColor: '#3b82f6',
                },
                {
                    label: 'Minimum',
                    data: [],
                    backgroundColor: 'rgba(100, 116, 139, 0.6)',
                    borderColor: '#64748b',
                    borderWidth: 0,
                    borderRadius: 6,
                    borderSkipped: false,
                    order: 3,
                    hoverBackgroundColor: '#94a3b8',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#0c1220',
                    titleColor: '#f8fafc',
                    bodyColor: '#cbd5e1',
                    borderColor: '#1e293b',
                    borderWidth: 1,
                    padding: 14,
                    cornerRadius: 12,
                    titleFont: { size: 13, weight: '700' },
                    bodyFont: { size: 12 },
                    displayColors: true,
                    boxPadding: 6,
                    usePointStyle: true,
                    callbacks: {
                        afterBody: function(context) {
                            const idx = context[0].dataIndex;
                            const stat = smpStats[idx];
                            const range = stat.peak - stat.min;
                            return `\nRange: ${range} players`;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 55,
                    grid: {
                        color: 'rgba(30, 41, 59, 0.5)',
                        drawBorder: false,
                    },
                    ticks: {
                        color: '#475569',
                        padding: 12,
                        font: { size: 11, family: "'JetBrains Mono', monospace" },
                        stepSize: 5
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        color: '#64748b',
                        font: { size: 11 },
                        maxRotation: 45,
                        minRotation: 0
                    }
                }
            },
            animation: {
                duration: 600,
                easing: 'easeOutQuart'
            },
            hover: {
                mode: 'index',
                intersect: false
            }
        }
    });
}

function renderConfig() {
    const container = document.getElementById('configRows');
    container.innerHTML = '';

    smpStats.forEach((stat, index) => {
        const row = document.createElement('div');
        row.className = 'config-row';
        row.innerHTML = `
            <input type="text" value="${stat.day}" onchange="updateStat(${index}, 'day', this.value)" placeholder="Day name">
            <input type="number" value="${stat.peak}" onchange="updateStat(${index}, 'peak', this.value)" placeholder="Peak" min="0" max="50">
            <input type="number" value="${stat.avg}" onchange="updateStat(${index}, 'avg', this.value)" placeholder="Avg" min="0" max="50">
            <input type="number" value="${stat.min}" onchange="updateStat(${index}, 'min', this.value)" placeholder="Min" min="0" max="50">
            <button class="btn btn-delete" onclick="removeDay(${index})" title="Remove day">×</button>
        `;
        container.appendChild(row);
    });

    const addBtn = document.getElementById('addBtn');
    document.getElementById('dayCounter').textContent = `${smpStats.length}/${MAX_DAYS}`;
    
    if (smpStats.length >= MAX_DAYS) {
        addBtn.disabled = true;
        addBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg> Max reached`;
    } else {
        addBtn.disabled = false;
        addBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg> Add Day (${smpStats.length}/${MAX_DAYS})`;
    }
}

function updateStat(index, field, value) {
    if (field === 'day') {
        smpStats[index][field] = value;
    } else {
        let num = parseInt(value) || 0;
        if (num > 50) num = 50;
        if (num < 0) num = 0;
        smpStats[index][field] = num;
    }
    updateChart();
    updateSummary();
    renderConfig();
}

function addDay() {
    if (smpStats.length >= MAX_DAYS) return;
    const nextDay = smpStats.length + 1;
    smpStats.push({ day: `Day ${nextDay}`, peak: 0, avg: 0, min: 0 });
    renderConfig();
    updateChart();
    updateSummary();

    setTimeout(() => {
        const scrollBox = document.querySelector('.config-scroll');
        scrollBox.scrollTop = scrollBox.scrollHeight;
    }, 50);
}

function removeDay(index) {
    if (smpStats.length <= 1) return;
    smpStats.splice(index, 1);
    // Renumber days
    smpStats.forEach((s, i) => { s.day = `Day ${i + 1}`; });
    renderConfig();
    updateChart();
    updateSummary();
}

function updateChart() {
    chart.data.labels = smpStats.map(s => s.day);
    chart.data.datasets[0].data = smpStats.map(s => s.peak);
    chart.data.datasets[1].data = smpStats.map(s => s.avg);
    chart.data.datasets[2].data = smpStats.map(s => s.min);

    chart.data.datasets.forEach((ds, i) => {
        ds.hidden = !visibleDatasets[i];
    });

    chart.update('active');
    drawSparklines();
}

function updateSummary() {
    const maxPeak = Math.max(...smpStats.map(s => s.peak), 0);
    const avgAll = smpStats.length > 0 ? Math.round(smpStats.reduce((a, b) => a + b.avg, 0) / smpStats.length) : 0;
    const totalHours = smpStats.reduce((a, b) => a + b.avg, 0) * 12;

    animateValue('totalPeak', parseInt(document.getElementById('totalPeak').textContent) || 0, maxPeak, 400);
    animateValue('totalAvg', parseInt(document.getElementById('totalAvg').textContent) || 0, avgAll, 400);
    document.getElementById('totalDays').textContent = smpStats.length;
    document.getElementById('totalPlayers').textContent = totalHours.toLocaleString();

    // Trend
    const trendEl = document.getElementById('trendDay');
    const trendText = document.getElementById('trendText');

    if (smpStats.length >= 2) {
        const last = smpStats[smpStats.length - 1];
        const prev = smpStats[smpStats.length - 2];
        const diff = last.peak - prev.peak;

        if (diff > 0) {
            trendEl.innerHTML = `<span class="trend-pill up">▲ ${diff}</span>`;
            trendText.innerHTML = '<span class="trend-up">Up from yesterday</span>';
        } else if (diff < 0) {
            trendEl.innerHTML = `<span class="trend-pill down">▼ ${Math.abs(diff)}</span>`;
            trendText.innerHTML = '<span class="trend-down">Down from yesterday</span>';
        } else {
            trendEl.innerHTML = `<span class="trend-pill flat">— 0</span>`;
            trendText.innerHTML = '<span class="trend-flat">No change</span>';
        }
    } else {
        trendEl.innerHTML = `<span class="trend-pill flat">—</span>`;
        trendText.innerHTML = '<span class="trend-flat">Need more data</span>';
    }
}

function animateValue(id, start, end, duration) {
    if (start === end) return;
    const el = document.getElementById(id);
    const range = end - start;
    const startTime = performance.now();
    
    function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + range * ease);
        if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
}

function setChartType(type) {
    currentChartType = type;
    document.querySelectorAll('.chart-toggle .toggle-btn').forEach((btn, i) => {
        if (i < 3) btn.classList.remove('active');
    });
    document.querySelectorAll('.chart-toggle .toggle-btn')[type === 'bar' ? 0 : type === 'line' ? 1 : 2].classList.add('active');

    if (type === 'mixed') {
        chart.config.type = 'bar';
        chart.data.datasets[0].type = 'line';
        chart.data.datasets[0].fill = false;
        chart.data.datasets[0].tension = 0.4;
        chart.data.datasets[0].pointRadius = 5;
        chart.data.datasets[0].pointBackgroundColor = '#22c55e';
        chart.data.datasets[0].pointBorderColor = '#0c1220';
        chart.data.datasets[0].pointBorderWidth = 2;
        chart.data.datasets[0].borderWidth = 2.5;
        chart.data.datasets[1].type = 'bar';
        chart.data.datasets[2].type = 'bar';
    } else if (type === 'line') {
        chart.config.type = 'line';
        chart.data.datasets.forEach(ds => {
            ds.type = 'line';
            ds.fill = false;
            ds.tension = 0.4;
            ds.pointRadius = 5;
            ds.pointBackgroundColor = ds.borderColor;
            ds.pointBorderColor = '#0c1220';
            ds.pointBorderWidth = 2;
            ds.borderWidth = 2.5;
        });
    } else {
        chart.config.type = 'bar';
        chart.data.datasets.forEach(ds => {
            ds.type = 'bar';
            delete ds.fill;
            delete ds.tension;
            delete ds.pointRadius;
            delete ds.pointBackgroundColor;
            delete ds.pointBorderColor;
            delete ds.pointBorderWidth;
            ds.borderWidth = 0;
        });
    }
    chart.update();
}

function toggleDataset(index) {
    visibleDatasets[index] = !visibleDatasets[index];
    const btns = document.querySelectorAll('.chart-toggle .toggle-btn');
    const colorMap = ['#22c55e', '#3b82f6', '#94a3b8'];
    if (visibleDatasets[index]) {
        btns[index + 4].classList.add('active');
        btns[index + 4].style.color = colorMap[index];
    } else {
        btns[index + 4].classList.remove('active');
        btns[index + 4].style.color = '#64748b';
    }
    updateChart();
}

function drawSparklines() {
    drawSparkline('sparkPeak', smpStats.map(s => s.peak), '#22c55e');
    drawSparkline('sparkAvg', smpStats.map(s => s.avg), '#3b82f6');
    drawSparkline('sparkDays', smpStats.map((_, i) => i + 1), '#a855f7');
    drawSparkline('sparkHours', smpStats.map(s => s.avg * 12), '#f59e0b');
    if (smpStats.length >= 2) {
        const diffs = smpStats.slice(1).map((s, i) => s.peak - smpStats[i].peak);
        drawSparkline('sparkTrend', diffs, '#ef4444');
    }
}

function drawSparkline(canvasId, data, color) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || data.length < 2) {
        if (canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        return;
    }
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.scale(dpr, dpr);

    ctx.clearRect(0, 0, w, h);
    const max = Math.max(...data, 1);
    const min = Math.min(...data);
    const range = max - min || 1;

    // Draw line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    data.forEach((val, i) => {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((val - min) / range) * (h - 8) - 4;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill gradient area
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + '25');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.fill();

    // Draw end dot
    const lastX = w;
    const lastY = h - ((data[data.length - 1] - min) / range) * (h - 8) - 4;
    ctx.beginPath();
    ctx.arc(lastX - 2, lastY, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

function exportData() {
    const blob = new Blob([JSON.stringify(smpStats, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lightcity-smp-season6.json';
    a.click();
    URL.revokeObjectURL(url);
}

function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data) && data.length <= MAX_DAYS && data.every(d => d.day && 'peak' in d && 'avg' in d && 'min' in d)) {
                smpStats = data;
                renderConfig();
                updateChart();
                updateSummary();
            } else {
                alert('Invalid file format or exceeds 50 days limit');
            }
        } catch (err) {
            alert('Failed to parse JSON file');
        }
    };
    reader.readAsText(file);
    input.value = '';
}

initChart();
renderConfig();
updateChart();
updateSummary();
drawSparklines();

window.addEventListener('resize', drawSparklines);
</script>
